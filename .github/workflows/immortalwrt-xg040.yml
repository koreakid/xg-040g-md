name: ImmortalWrt XG-040G-MD (bootstrap)

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "ImmortalWrt source"
        required: true
        default: "https://github.com/bingoguo93/immortalwrt.git"
      source_branch:
        description: "Source branch"
        required: true
        default: "openwrt-24.10"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler flex gawk gettext gcc-multilib g++-multilib \
            git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev \
            libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
            libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 \
            python3-pip python3-ply python3-docutils python3-setuptools qemu-utils rsync scons squashfs-tools \
            subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: Clone source
        run: |
          git clone --depth 1 -b "${{ github.event.inputs.source_branch }}" "${{ github.event.inputs.source_repo }}" immortalwrt

      - name: Apply XG-040G-MD device patch from Kwrt
        working-directory: immortalwrt
        run: |
          git clone --depth 1 -b 25.12 https://github.com/kiddin9/Kwrt.git /tmp/kwrt
          cp /tmp/kwrt/devices/airoha_an7581/patches/xg-040g-md.patch /tmp/xg-040g-md.patch
          patch -p1 < /tmp/xg-040g-md.patch

          # Ensure device DTS exists (some patch versions only add image rules)
          mkdir -p target/linux/airoha/dts
          cp -f /tmp/kwrt/devices/airoha_an7581/diy/target/linux/airoha/dts/an7581-xg-040g-md.dts target/linux/airoha/dts/

      - name: Custom feeds and scripts
        working-directory: immortalwrt
        run: |
          chmod +x ../scripts/diy-part1.sh ../scripts/diy-part2.sh
          ../scripts/diy-part1.sh

      - name: Update and install feeds
        working-directory: immortalwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply XG-040 bootstrap config
        working-directory: immortalwrt
        run: |
          cp ../config/xg040-bootstrap.config .config
          ../scripts/diy-part2.sh
          make defconfig

          # Hard-fix package clash: force mbedTLS stack only
          sed -i '/^CONFIG_PACKAGE_luci-ssl=/d;/^# CONFIG_PACKAGE_luci-ssl is not set/d' .config
          sed -i '/^CONFIG_PACKAGE_wpad-openssl=/d;/^# CONFIG_PACKAGE_wpad-openssl is not set/d' .config
          sed -i '/^CONFIG_PACKAGE_wpad-mbedtls=/d;/^# CONFIG_PACKAGE_wpad-mbedtls is not set/d' .config
          sed -i '/^CONFIG_PACKAGE_libustream-openssl=/d;/^# CONFIG_PACKAGE_libustream-openssl is not set/d' .config
          sed -i '/^CONFIG_PACKAGE_libustream-mbedtls=/d;/^# CONFIG_PACKAGE_libustream-mbedtls is not set/d' .config
          sed -i '/^CONFIG_PACKAGE_libustream-openssl20201210=/d;/^# CONFIG_PACKAGE_libustream-openssl20201210 is not set/d' .config
          sed -i '/^CONFIG_PACKAGE_libustream-mbedtls20201210=/d;/^# CONFIG_PACKAGE_libustream-mbedtls20201210 is not set/d' .config

          echo '# CONFIG_PACKAGE_luci-ssl is not set' >> .config
          echo '# CONFIG_PACKAGE_wpad-openssl is not set' >> .config
          echo 'CONFIG_PACKAGE_wpad-mbedtls=y' >> .config
          echo '# CONFIG_PACKAGE_libustream-openssl is not set' >> .config
          echo 'CONFIG_PACKAGE_libustream-mbedtls=y' >> .config
          echo '# CONFIG_PACKAGE_libustream-openssl20201210 is not set' >> .config
          echo 'CONFIG_PACKAGE_libustream-mbedtls20201210=y' >> .config
          make defconfig

          mkdir -p ../artifacts
          ./scripts/diffconfig.sh > ../artifacts/diffconfig.txt || true
          grep -E '^CONFIG_PACKAGE_(luci-ssl|wpad-(openssl|mbedtls)|libustream-(openssl|mbedtls)(20201210)?)=' .config || true

      - name: Download sources
        working-directory: immortalwrt
        run: make download -j8

      - name: Build firmware
        working-directory: immortalwrt
        run: |
          set -o pipefail
          mkdir -p ../artifacts
          (make -j$(nproc) V=s || make -j1 V=s) 2>&1 | tee ../artifacts/build.log

      - name: Organize artifacts
        if: always()
        working-directory: immortalwrt
        run: |
          mkdir -p ../artifacts
          cp -a .config ../artifacts/ || true
          cp -a bin/targets ../artifacts/targets || true
          cp -a bin/packages ../artifacts/packages || true
          find . -maxdepth 2 -name "*.log" -type f -exec cp {} ../artifacts/ \; || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-xg040-bootstrap-${{ github.run_number }}
          path: artifacts
          if-no-files-found: warn
